<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALDI21 Admin</title>
  <style>
    :root {
      --bg1:#07224d;
      --bg2:#021226;
      --gold:#ffd978;
      --red:#d61e24;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      min-height:100vh;
      font-family:Arial,sans-serif;
      color:#fff;
      background:radial-gradient(circle at 50% 10%, #0a3773 0%, var(--bg1) 40%, var(--bg2) 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .card {
      width:min(100%,400px);
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.18);
      border-radius:22px;
      padding:32px 28px 28px;
      display:flex;
      flex-direction:column;
      gap:22px;
    }
    .card-head {
      display:flex;
      align-items:center;
      gap:14px;
    }
    .target-badge {
      width:56px;
      height:56px;
      border-radius:50%;
      background:#fff;
      border:5px solid var(--red);
      display:grid;
      place-items:center;
      flex-shrink:0;
    }
    .target-badge span {
      font-weight:900;
      font-size:13px;
      color:var(--red);
      line-height:1;
      text-align:center;
      padding:2px;
    }
    h1 {
      margin:0;
      font-size:22px;
      font-weight:900;
      line-height:1.15;
    }
    h1 small {
      display:block;
      font-size:13px;
      font-weight:700;
      color:rgba(255,255,255,.6);
      margin-top:3px;
    }
    label {
      font-size:13px;
      font-weight:800;
      color:rgba(255,255,255,.78);
      display:block;
      margin-bottom:8px;
    }
    .input-row {
      display:flex;
      align-items:center;
      gap:0;
      background:rgba(0,0,0,.38);
      border:2px solid rgba(255,255,255,.22);
      border-radius:14px;
      overflow:hidden;
    }
    .input-prefix {
      padding:0 14px;
      font-size:26px;
      font-weight:900;
      color:rgba(255,255,255,.5);
      user-select:none;
    }
    input[type="number"] {
      flex:1;
      border:0;
      background:transparent;
      color:#fff;
      font-size:32px;
      font-weight:900;
      padding:14px 10px 14px 0;
      outline:none;
      min-width:0;
      -moz-appearance:textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance:none; }
    .preview {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:14px;
      background:rgba(0,0,0,.28);
      border-radius:14px;
      font-size:14px;
      font-weight:800;
      color:rgba(255,255,255,.7);
    }
    .preview-circle {
      width:52px;
      height:52px;
      border-radius:50%;
      background:#fff;
      border:5px solid var(--red);
      display:grid;
      place-items:center;
      flex-shrink:0;
    }
    .preview-circle span {
      font-weight:900;
      font-size:12px;
      color:var(--red);
      text-align:center;
    }
    .btn-save {
      border:0;
      border-radius:999px;
      padding:15px 24px;
      font-size:18px;
      font-weight:900;
      background:var(--gold);
      color:#172033;
      cursor:pointer;
      box-shadow:0 8px 22px rgba(0,0,0,.28);
      transition:transform .18s ease, box-shadow .18s ease;
      width:100%;
    }
    .btn-save:hover { transform:scale(1.03); }
    .btn-save:active { transform:scale(.97); }
    .toast {
      display:none;
      background:#2e7d32;
      color:#fff;
      border-radius:12px;
      padding:12px 18px;
      font-weight:800;
      font-size:14px;
      text-align:center;
    }
    .toast.show { display:block; }
    .current-info {
      font-size:13px;
      color:rgba(255,255,255,.55);
      text-align:center;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-head">
      <div class="target-badge"><span id="badgeText">$21</span></div>
      <h1>ALDI21 Admin<small>Set today's target figure</small></h1>
    </div>

    <div>
      <label for="targetInput">Daily Target ($)</label>
      <div class="input-row">
        <span class="input-prefix">$</span>
        <input type="number" id="targetInput" min="1" max="999" step="0.01" placeholder="21.00">
      </div>
    </div>

    <div class="preview">
      <div class="preview-circle"><span id="previewText">$21</span></div>
      <span>This is what players will see in the header</span>
    </div>

    <button class="btn-save" onclick="saveTarget()">Save Target</button>
    <div class="toast" id="toast">✓ Target saved! Players will now see this figure.</div>
    <div class="current-info" id="currentInfo">Current target: loading…</div>
  </div>

  <script>
    const input = document.getElementById('targetInput');
    const badgeText = document.getElementById('badgeText');
    const previewText = document.getElementById('previewText');
    const currentInfo = document.getElementById('currentInfo');

    function fmt(v) {
      if (!v || isNaN(v)) return '?';
      const n = parseFloat(v);
      return n % 1 === 0 ? '$' + n : '$' + n.toFixed(2);
    }

    function updatePreview() {
      const val = parseFloat(input.value);
      const label = isNaN(val) ? '$?' : fmt(val);
      badgeText.textContent = label;
      previewText.textContent = label;
    }

    input.addEventListener('input', updatePreview);

    function saveTarget() {
      const val = parseFloat(input.value);
      if (isNaN(val) || val <= 0) {
        alert('Enter a valid dollar amount.');
        return;
      }
      localStorage.setItem('aldi21_target', val.toFixed(2));
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      currentInfo.textContent = 'Current target: ' + fmt(val);
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Load existing on mount
    window.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('aldi21_target');
      if (saved) {
        input.value = parseFloat(saved).toFixed(2);
        currentInfo.textContent = 'Current target: ' + fmt(saved);
        updatePreview();
      } else {
        input.value = '21.00';
        currentInfo.textContent = 'Current target: $21 (default)';
        updatePreview();
      }
    });
  </script>
</body>
</html>
