<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BasketBullseye Admin</title>
  <style>
    :root { --bg1:#07224d; --bg2:#021226; --gold:#ffd978; --red:#d61e24; }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; font-family:Arial,sans-serif; color:#fff;
      background:radial-gradient(circle at 50% 10%, #0a3773 0%, var(--bg1) 40%, var(--bg2) 100%);
      display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .card {
      width:min(100%,400px); background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.18); border-radius:22px;
      padding:32px 28px 28px; display:flex; flex-direction:column; gap:22px;
    }
    .card-head { display:flex; align-items:center; gap:14px; }
    .target-badge {
      width:56px; height:56px; border-radius:50%; background:#fff;
      border:5px solid var(--red); display:grid; place-items:center; flex-shrink:0;
    }
    .target-badge span { font-weight:900; font-size:13px; color:var(--red); line-height:1; text-align:center; }
    h1 { margin:0; font-size:22px; font-weight:900; line-height:1.15; }
    h1 small { display:block; font-size:13px; font-weight:700; color:rgba(255,255,255,.6); margin-top:3px; }
    label { font-size:13px; font-weight:800; color:rgba(255,255,255,.78); display:block; margin-bottom:8px; }
    label span { font-weight:400; color:rgba(255,255,255,.45); }
    .input-row {
      display:flex; align-items:center; background:rgba(0,0,0,.38);
      border:2px solid rgba(255,255,255,.22); border-radius:14px; overflow:hidden;
    }
    .input-prefix { padding:0 14px; font-size:24px; color:rgba(255,255,255,.5); user-select:none; }
    input[type="password"], input[type="text"] {
      flex:1; border:0; background:transparent; color:#fff;
      font-size:20px; font-weight:900; padding:14px 10px 14px 0; outline:none; min-width:0;
    }
    input[type="number"] {
      flex:1; border:0; background:transparent; color:#fff;
      font-size:32px; font-weight:900; padding:14px 10px 14px 0;
      outline:none; min-width:0; -moz-appearance:textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance:none; }
    textarea {
      width:100%; border:0; background:rgba(0,0,0,.38); color:#fff;
      font-size:13px; font-weight:700; padding:14px; outline:none;
      border:2px solid rgba(255,255,255,.22); border-radius:14px;
      resize:vertical; min-height:140px; line-height:1.6; font-family:Arial,sans-serif;
    }
    textarea::placeholder { color:rgba(255,255,255,.3); }
    .preview {
      display:flex; align-items:center; justify-content:center; gap:10px;
      padding:14px; background:rgba(0,0,0,.28); border-radius:14px;
      font-size:14px; font-weight:800; color:rgba(255,255,255,.7);
    }
    .preview-circle {
      width:52px; height:52px; border-radius:50%; background:#fff;
      border:5px solid var(--red); display:grid; place-items:center; flex-shrink:0;
    }
    .preview-circle span { font-weight:900; font-size:12px; color:var(--red); text-align:center; }
    .btn-save {
      border:0; border-radius:999px; padding:15px 24px; font-size:18px; font-weight:900;
      background:var(--gold); color:#172033; cursor:pointer;
      box-shadow:0 8px 22px rgba(0,0,0,.28); transition:transform .18s ease; width:100%;
    }
    .btn-save:hover { transform:scale(1.03); }
    .btn-save:active { transform:scale(.97); }
    .btn-save:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .toast { display:none; border-radius:12px; padding:12px 18px; font-weight:800; font-size:14px; text-align:center; }
    .toast.show { display:block; }
    .toast.success { background:#2e7d32; }
    .toast.error { background:#c62828; }
    .current-info { font-size:13px; color:rgba(255,255,255,.55); text-align:center; font-weight:700; }
    .section-divider { border:0; border-top:1px solid rgba(255,255,255,.15); margin:0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-head">
      <div class="target-badge"><span id="badgeText">$21</span></div>
      <h1>BasketBullseye Admin<small>Manage today's game</small></h1>
    </div>

    <div>
      <label for="passwordInput">Admin Password</label>
      <div class="input-row">
        <span class="input-prefix">🔒</span>
        <input type="password" id="passwordInput" placeholder="password">
      </div>
    </div>

    <hr class="section-divider">

    <div>
      <label for="targetInput">Today's Target ($)</label>
      <div class="input-row">
        <span class="input-prefix">$</span>
        <input type="number" id="targetInput" min="1" max="999" step="0.01" placeholder="21.00">
      </div>
    </div>

    <div class="preview">
      <div class="preview-circle"><span id="previewText">$21</span></div>
      <span>This is what all players will see</span>
    </div>

    <hr class="section-divider">

    <div>
      <label for="winnersInput">Winners List <span>(one per line — newest at top)</span></label>
      <textarea id="winnersInput" placeholder="Game #217 Dave $21.00&#10;Game #216 Bob G $23.80&#10;Game #215 Sally $13.78"></textarea>
    </div>

    <button class="btn-save" id="saveBtn" onclick="saveAll()">Save</button>
    <div class="toast" id="toast"></div>
    <div class="current-info" id="currentInfo">Loading…</div>
  </div>

  <script>
    const targetInput = document.getElementById('targetInput');
    const badgeText   = document.getElementById('badgeText');
    const previewText = document.getElementById('previewText');
    const currentInfo = document.getElementById('currentInfo');
    const toast       = document.getElementById('toast');
    const saveBtn     = document.getElementById('saveBtn');

    function fmt(v) {
      if (!v || isNaN(v)) return '?';
      const n = parseFloat(v);
      return n % 1 === 0 ? '$' + n : '$' + n.toFixed(2);
    }

    function showToast(msg, type) {
      toast.textContent = msg;
      toast.className = 'toast show ' + type;
      setTimeout(() => toast.className = 'toast', 3500);
    }

    function updatePreview() {
      const val = parseFloat(targetInput.value);
      const label = isNaN(val) ? '$?' : fmt(val);
      badgeText.textContent = label;
      previewText.textContent = label;
    }

    targetInput.addEventListener('input', updatePreview);

    async function saveAll() {
      const val      = parseFloat(targetInput.value);
      const winners  = document.getElementById('winnersInput').value.trim();
      const password = document.getElementById('passwordInput').value;

      if (!password) { showToast('Enter the admin password.', 'error'); return; }
      if (isNaN(val) || val <= 0) { showToast('Enter a valid dollar amount.', 'error'); return; }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';

      try {
        const [r1, r2] = await Promise.all([
          fetch('/api/target', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ target: val, password })
          }),
          fetch('/api/winners', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ winners, password })
          })
        ]);

        const d1 = await r1.json();
        if (!r1.ok) {
          showToast('❌ ' + (d1.error || 'Failed'), 'error');
        } else {
          const lineCount = winners.split('\n').filter(l => l.trim()).length;
          showToast('✓ Saved! Target: ' + fmt(val) + ' | ' + lineCount + ' winner' + (lineCount !== 1 ? 's' : ''), 'success');
          currentInfo.textContent = 'Target: ' + fmt(val) + ' | ' + lineCount + ' winner' + (lineCount !== 1 ? 's' : '') + ' listed';
        }
      } catch(e) {
        showToast('❌ Network error', 'error');
      }

      saveBtn.disabled = false;
      saveBtn.textContent = 'Save';
    }

    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const [tRes, wRes] = await Promise.all([
          fetch('/api/target'),
          fetch('/api/winners')
        ]);
        const tData = await tRes.json();
        const wData = await wRes.json().catch(() => ({}));

        if (tData.target) {
          targetInput.value = parseFloat(tData.target).toFixed(2);
          updatePreview();
        }
        if (wData.winners) {
          document.getElementById('winnersInput').value = wData.winners;
        }
        const lineCount = (wData.winners || '').split('\n').filter(l => l.trim()).length;
        currentInfo.textContent = 'Target: ' + fmt(tData.target) + ' | ' + lineCount + ' winner' + (lineCount !== 1 ? 's' : '') + ' listed';
      } catch(e) {
        currentInfo.textContent = 'Could not load current settings.';
      }
    });
  </script>
</body>
</html>
